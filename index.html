<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>TaskeganaM - The Task Manager from Hell</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="icon" href="images/icon.png" type="image/png">
</head>

<body>
    <img src="images/icon.png" style="display: block; margin-left: auto; margin-right: auto;" height="10%" width="10%">
    <h4>Welcome to TaskeganaM, The Task Manager from Hell</h4>

    <div id="tasks">
        <input id="task-input" placeholder="Enter a task">
        <select name="priority-selector" id="priority">
            <option value="medium"> Medium Priority</option>
            <option value="high"> Low Priority</option>
            <option value="low"> High Priority</option>
        </select>

        <button onclick="addtasks()" id="add-task"> Add Task</button>
    </div>

    <div class="modal" id="mathmodal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Solve to delete task</h5>
                </div>

                <div class="modal-body">
                    <p id="question"></p>
                    <input id="answer1" class="form-control" placeholder="Enter first value">
                    <input id="answer2" class="form-control" placeholder="Enter second value">
                </div>

                <div class="modal-footer">
                    <button id="submit-answer" class="btn btn-danger">Submit answer.</button>
                </div>

            </div>
        </div>
    </div>

    <ul id="tasklist"></ul>

    <footer class="site-footer">
        <div class="footer-left">
            <small>© 2026 TaskeganaM</small>
        </div>

        <div class="footer-right">
            <span>Want to help improve this project?</span>
            <a href="https://github.com/Skayyali3/TaskeganaM"
                target="_blank"
                rel="noopener noreferrer"
                class="github-link">

                <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 0.3a12 12 0 00-3.8 23.4c.6.1.8-.2.8-.5v-1.9c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.9 1.3 3.6 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.4-1.3-5.4-5.8 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.4 11.4 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.8.1 3.1.8.8 1.2 1.9 1.2 3.2 0 4.5-2.8 5.5-5.4 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5A12 12 0 0012 .3z"/>
                </svg>

                Contribute on GitHub
            </a>
        </div>

    </footer>

    <script src="app.js"></script>
</body>

</html>
